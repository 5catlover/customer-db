<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="고객DB">
<title>고객DB</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
:root { --accent: #1a1a1a; --green: #3B6D11; --green-bg: #EAF3DE; --border: #e8e8e8; --text: #1a1a1a; --text2: #666; --text3: #aaa; --bg: #f5f5f5; }
body { background: var(--bg); min-height: 100vh; padding-bottom: 100px; }

/* 상단 탭 */
.tab-bar { display: flex; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; font-weight: 500; color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 등록 폼 */
.form-wrap { padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; }
.form-group { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; display: block; }
input[type=text], input[type=tel], textarea, select {
  width: 100%; font-size: 16px; border: none; outline: none; background: transparent;
  color: var(--text); padding: 0; font-family: inherit;
}
input::placeholder, textarea::placeholder { color: #ccc; }
textarea { resize: none; min-height: 72px; line-height: 1.5; }

.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 7px 14px; font-size: 13px; border: 1px solid var(--border); border-radius: 999px; cursor: pointer; background: #fff; color: var(--text2); transition: all 0.12s; user-select: none; }
.chip.active-teal { background: #E1F5EE; border-color: #0F6E56; color: #085041; font-weight: 500; }
.chip.active-purple { background: #EEEDFE; border-color: #534AB7; color: #3C3489; font-weight: 500; }
.chip.active-amber { background: #FAEEDA; border-color: #BA7517; color: #633806; font-weight: 500; }

/* 저장 버튼 */
.save-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); padding: 12px 1rem; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
.save-btn { width: 100%; padding: 15px; font-size: 16px; font-weight: 600; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; color: #fff; transition: all 0.15s; }
.save-btn.saved { background: var(--green); }
.save-btn:active { opacity: 0.85; transform: scale(0.98); }
.sync-row { display: flex; gap: 6px; margin-top: 8px; }
.sync-badge { flex: 1; font-size: 11px; padding: 5px 8px; border-radius: 8px; text-align: center; border: 1px solid var(--border); color: var(--text3); background: var(--bg); }
.sync-badge.ok { background: var(--green-bg); border-color: #639922; color: var(--green); }

/* 고객 목록 */
.list-wrap { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
.search-box { background: #fff; border-radius: 12px; padding: 12px 16px; border: 1px solid var(--border); font-size: 16px; width: 100%; outline: none; }
.list-header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
.list-title { font-size: 13px; font-weight: 600; color: var(--text); }
.count-badge { font-size: 11px; background: #eee; color: var(--text2); padding: 2px 8px; border-radius: 999px; }
.customer-card { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
.card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.card-phone { font-size: 13px; color: var(--text2); margin-top: 1px; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.card-date { font-size: 11px; color: var(--text3); }
.card-memo { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
.delete-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 4px; }
.empty-state { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 14px; line-height: 2; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="showTab('form')">✏️ 고객 등록</div>
  <div class="tab" onclick="showTab('list')" id="list-tab">📋 목록 <span id="count-tab"></span></div>
</div>

<!-- 등록 폼 -->
<div id="tab-form">
  <div class="form-wrap">
    <div class="form-group">
      <label class="form-label">특징 / 메모</label>
      <input type="text" id="inp-feature" placeholder="예: 30대 부부, 방 2개 필요" />
    </div>
    <div class="form-group">
      <label class="form-label">연락처</label>
      <input type="tel" id="inp-phone" placeholder="010-0000-0000" />
    </div>
    <div class="form-group">
      <label class="form-label">손님구분</label>
      <div class="chip-group" id="guest-type">
        <button class="chip" data-val="매매">매매</button>
        <button class="chip" data-val="전세">전세</button>
        <button class="chip" data-val="월세">월세</button>
        <button class="chip" data-val="임대">임대</button>
        <button class="chip" data-val="분양">분양</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">문의방법</label>
      <div class="chip-group" id="method">
        <button class="chip" data-val="전화">전화</button>
        <button class="chip" data-val="방문">방문</button>
        <button class="chip" data-val="문자">문자</button>
        <button class="chip" data-val="카카오">카카오</button>
        <button class="chip" data-val="네이버">네이버</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">관심도</label>
      <div class="chip-group" id="interest">
        <button class="chip" data-val="상">★★★ 상</button>
        <button class="chip" data-val="중">★★ 중</button>
        <button class="chip" data-val="하">★ 하</button>
        <button class="chip" data-val="관망">관망</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">문의 / 요청사항</label>
      <textarea id="inp-request" placeholder="예: 보증금 2천 월130-140, 주차 필수"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">안내물건</label>
      <input type="text" id="inp-property" placeholder="예: 옥정 A아파트 3층" />
    </div>
  </div>

  <div class="save-wrap">
    <button class="save-btn" id="save-btn" onclick="saveCustomer()">☁ 저장 (시트 + 노션)</button>
    <div class="sync-row">
      <div class="sync-badge" id="badge-sheet">📊 스프레드시트</div>
      <div class="sync-badge" id="badge-notion">📝 노션</div>
    </div>
  </div>
</div>

<!-- 목록 -->
<div id="tab-list" class="hidden">
  <div class="list-wrap">
    <div class="list-header">
      <span class="list-title">고객 목록</span>
      <span class="count-badge" id="count-badge">0명</span>
    </div>
    <input type="text" class="search-box" placeholder="🔍  이름·연락처 검색" oninput="renderList()" id="search-inp" />
    <div id="customer-list">
      <div class="empty-state">등록된 고객이 없습니다<br>등록 탭에서 첫 고객을 추가해보세요</div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhpAgmvFogtHQqwuyVFsQYfyndPHmn8XJbyWDq2TQGZ65S35FugL2ABgXnof4UaL5rLA/exec';
let customers = [];
let selectedGuestType = '', selectedMethod = '', selectedInterest = '';
const avatarColors = [
  { bg: '#EEEDFE', color: '#3C3489' }, { bg: '#E1F5EE', color: '#085041' },
  { bg: '#E6F1FB', color: '#0C447C' }, { bg: '#FAEEDA', color: '#633806' },
  { bg: '#FAECE7', color: '#712B13' },
];

function showTab(name) {
  document.getElementById('tab-form').classList.toggle('hidden', name !== 'form');
  document.getElementById('tab-list').classList.toggle('hidden', name !== 'list');
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (name==='form')));
}

function setupChips(groupId, getter, setter, colorClass) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(btn => {
    btn.addEventListener('click', () => {
      setter(getter() === btn.dataset.val ? '' : btn.dataset.val);
      document.querySelectorAll(`#${groupId} .chip`).forEach(b =>
        b.classList.remove('active-teal','active-purple','active-amber'));
      if (getter()) btn.classList.add(colorClass);
    });
  });
}
setupChips('guest-type', () => selectedGuestType, v => selectedGuestType = v, 'active-teal');
setupChips('method', () => selectedMethod, v => selectedMethod = v, 'active-purple');
setupChips('interest', () => selectedInterest, v => selectedInterest = v, 'active-amber');

document.getElementById('inp-phone').addEventListener('input', function() {
  const d = this.value.replace(/\D/g,'');
  if (d.length <= 3) this.value = d;
  else if (d.length <= 7) this.value = d.slice(0,3)+'-'+d.slice(3);
  else this.value = d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7,11);
});

function now() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function saveCustomer() {
  const feature  = document.getElementById('inp-feature').value.trim();
  const phone    = document.getElementById('inp-phone').value.trim();
  const request  = document.getElementById('inp-request').value.trim();
  const property = document.getElementById('inp-property').value.trim();
  const date     = now();

  const btn = document.getElementById('save-btn');
  const badgeSheet = document.getElementById('badge-sheet');
  const badgeNotion = document.getElementById('badge-notion');

  btn.textContent = '저장 중...';
  btn.disabled = true;

  const params = new URLSearchParams({
    date, feature, phone,
    guestType: selectedGuestType, method: selectedMethod,
    interest: selectedInterest, request, property, status: '문의'
  });

  try {
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const json = await res.json();

    btn.classList.add('saved');
    btn.textContent = '✓ 저장 완료!';
    badgeSheet.className = 'sync-badge ok';
    badgeSheet.textContent = '✓ 스프레드시트';
    badgeNotion.className = 'sync-badge ok';
    badgeNotion.textContent = '✓ 노션';

    customers.unshift({ feature, phone, guestType: selectedGuestType,
      method: selectedMethod, interest: selectedInterest,
      request, property, date, id: Date.now(), colorIdx: customers.length % 5 });
    renderList();
    resetForm();

    setTimeout(() => {
      btn.classList.remove('saved');
      btn.textContent = '☁ 저장 (시트 + 노션)';
      btn.disabled = false;
      badgeSheet.className = 'sync-badge'; badgeSheet.textContent = '📊 스프레드시트';
      badgeNotion.className = 'sync-badge'; badgeNotion.textContent = '📝 노션';
    }, 2500);

  } catch(err) {
    btn.textContent = '저장 실패 — 다시 시도';
    btn.disabled = false;
  }
}

function resetForm() {
  ['inp-feature','inp-phone','inp-request','inp-property'].forEach(id => document.getElementById(id).value = '');
  selectedGuestType = selectedMethod = selectedInterest = '';
  document.querySelectorAll('.chip').forEach(b =>
    b.classList.remove('active-teal','active-purple','active-amber'));
}

function deleteCustomer(id) {
  customers = customers.filter(c => c.id !== id);
  renderList();
}

function renderList() {
  const q = document.getElementById('search-inp').value.trim().toLowerCase();
  const filtered = customers.filter(c =>
    (c.feature||'').toLowerCase().includes(q) || (c.phone||'').includes(q));
  const total = customers.length;
  document.getElementById('count-badge').textContent = total + '명';
  document.getElementById('count-tab').textContent = total > 0 ? `(${total})` : '';
  const el = document.getElementById('customer-list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state">${total === 0 ? '등록된 고객이 없습니다<br>등록 탭에서 첫 고객을 추가해보세요' : '검색 결과가 없습니다'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(c => {
    const col = avatarColors[c.colorIdx];
    const tags = [];
    if (c.guestType) tags.push(`<span class="tag" style="background:#E1F5EE;border-color:#5DCAA5;color:#085041">${c.guestType}</span>`);
    if (c.method)    tags.push(`<span class="tag" style="background:#EEEDFE;border-color:#AFA9EC;color:#3C3489">${c.method}</span>`);
    if (c.interest)  tags.push(`<span class="tag" style="background:#FAEEDA;border-color:#EF9F27;color:#633806">${c.interest}</span>`);
    return `<div class="customer-card">
      <div class="card-top">
        <div class="avatar" style="background:${col.bg};color:${col.color}">${(c.feature||'?').slice(0,2)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${c.feature || '(특징 없음)'}</div>
          <div class="card-phone">${c.phone || '연락처 없음'}</div>
        </div>
        <button class="delete-btn" onclick="deleteCustomer(${c.id})">🗑</button>
      </div>
      ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
      ${c.request ? `<div class="card-memo">${c.request}</div>` : ''}
      <div class="card-footer">
        <span class="card-date">${c.date}</span>
        ${c.property ? `<span style="font-size:11px;color:#aaa">${c.property}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
